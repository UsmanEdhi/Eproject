<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FOTOLAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bg:'#0a0a0a', surface:'#141414', card:'#1a1a1a', border:'#2a2a2a', accent:'#d4a853', accentDark:'#b8923f', muted:'#888888', fg:'#f5f5f5' },
                    fontFamily: { display:['Bebas Neue','sans-serif'], body:['Inter','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        :root { --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#2a2a2a;--accent:#d4a853;--accent-dark:#b8923f;--muted:#888888;--fg:#f5f5f5; }
        * { scrollbar-width:thin; scrollbar-color:var(--accent) var(--surface); }
        html { scroll-behavior:smooth; }
        @media (prefers-reduced-motion:reduce) { html{scroll-behavior:auto;} *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;} }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--fg); overflow-x:hidden; }
        .font-display { font-family:'Bebas Neue',sans-serif; }

        .reveal { opacity:0; transform:translateY(40px); transition:opacity 0.8s cubic-bezier(0.16,1,0.3,1),transform 0.8s cubic-bezier(0.16,1,0.3,1); }
        .reveal.active { opacity:1; transform:translateY(0); }
        .reveal-delay-1{transition-delay:0.1s;} .reveal-delay-2{transition-delay:0.2s;} .reveal-delay-3{transition-delay:0.3s;} .reveal-delay-4{transition-delay:0.4s;}

        .btn-primary { background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%); color:var(--bg); font-weight:600; padding:12px 28px; border-radius:4px; transition:all 0.3s ease; position:relative; overflow:hidden; display:inline-block; text-decoration:none; border:none; cursor:pointer; }
        .btn-primary::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); transition:left 0.5s ease; }
        .btn-primary:hover::before { left:100%; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px -8px var(--accent); }

        .btn-secondary { background:transparent; border:1px solid var(--accent); color:var(--accent); padding:10px 24px; border-radius:4px; transition:all 0.3s ease; display:inline-block; text-decoration:none; cursor:pointer; }
        .btn-secondary:hover { background:var(--accent); color:var(--bg); }

        .nav-link { position:relative; padding:8px 0; transition:color 0.3s ease; text-decoration:none; }
        .nav-link::after { content:''; position:absolute; bottom:0; left:0; width:0; height:2px; background:var(--accent); transition:width 0.3s ease; }
        .nav-link:hover { color:var(--accent); }
        .nav-link:hover::after { width:100%; }

        .mobile-menu { transform:translateX(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); }
        .mobile-menu.open { transform:translateX(0); }

        .contact-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 24px; transition: all 0.3s ease;
        }
        .contact-card:hover { border-color: var(--accent); }

        .form-input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            padding: 12px 16px; border-radius: 6px; color: var(--fg); font-size: 14px;
            transition: border-color 0.3s ease; outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--muted); }

        .toast {
            position: fixed; top: 80px; right: 20px; background: var(--card);
            border: 1px solid var(--accent); border-radius: 8px; padding: 16px 24px;
            z-index: 100; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
            display: flex; align-items: center; gap: 12px;
        }
        .toast.show { transform: translateX(0); }

        .section-divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }
        button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    </style>
</head>
<body class="min-h-screen pt-16 lg:pt-
